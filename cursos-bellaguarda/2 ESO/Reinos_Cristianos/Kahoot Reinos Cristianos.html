<!DOCTYPE html>
<html lang="ca">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test: Naixement dels regnes cristians i expansió (3r ESO)</title>
    <style>
        :root {
            --primary: #2c3e50;   /* Blau fosc */
            --accent: #e67e22;    /* Taronja */
            --bg: #f7f8fa;
            --correct: #27ae60;
            --incorrect: #e74c3c;
            --info: #3498db;      /* Blau per contestada */
        }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background-color: var(--bg); display: flex; justify-content: center; padding: 20px; margin: 0; }
        .quiz-container { background: white; width: 100%; max-width: 760px; padding: 30px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); border-top: 8px solid var(--primary); }
        .header { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #eee; padding-bottom: 15px; margin-bottom: 20px; gap: 12px; }
        .q-circle { background: var(--primary); color: white; width: 40px; height: 40px; display: flex; align-items: center; justify-content: center; border-radius: 50%; font-weight: bold; flex: 0 0 auto; }
        #progress-text { color: #2c3e50; font-weight: 600; }
        h2 { font-size: 1.25rem; min-height: 64px; color: var(--primary); line-height: 1.4; margin: 0 0 10px 0; }

        .options { display: grid; gap: 12px; margin-bottom: 10px; }
        .opt-btn { padding: 16px; border: 2px solid #eee; border-radius: 10px; background: #fff; cursor: pointer; text-align: left; font-size: 1rem; transition: 0.2s; width: 100%; }
        .opt-btn:hover { border-color: var(--accent); background: #fff5ea; }
        .opt-btn.selected { border-color: var(--primary); background: #eef2f7; }
        .opt-btn.correct { background: var(--correct) !important; color: white; border-color: var(--correct); }
        .opt-btn.wrong { background: var(--incorrect) !important; color: white; border-color: var(--incorrect); }

        .nav-controls { display: flex; justify-content: space-between; gap: 10px; margin-top: 16px; flex-wrap: wrap; }
        button.action { padding: 12px 24px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; transition: 0.25s; font-size: 0.95rem; }
        .btn-nav { background: #ecf0f1; color: #7f8c8d; }
        .btn-nav:hover { background: #bdc3c7; color: white; }
        .btn-check { background: var(--accent); color: white; }
        .btn-finish { background: var(--primary); color: white; }

        .feedback { margin-top: 10px; font-weight: bold; text-align: center; height: 26px; font-size: 1.05rem; }

        .grid-nav { display: grid; grid-template-columns: repeat(10, 1fr); gap: 6px; margin-top: 26px; padding-top: 18px; border-top: 1px solid #eee; }
        .grid-item { font-size: 0.78rem; padding: 9px 0; border: 1px solid #ddd; text-align: center; cursor: pointer; border-radius: 6px; transition: 0.2s; user-select: none; }
        .grid-item.active { background: var(--primary); color: white; border-color: var(--primary); }

        .grid-item.completed { border: 2px solid var(--info); }
        .grid-item.correct { border: 2px solid var(--correct); background: #eafff0; }
        .grid-item.wrong { border: 2px solid var(--incorrect); background: #fff0f0; }

        #result-screen { display: none; text-align: center; padding: 40px 10px; }
        #result-title { margin: 0 0 10px 0; color: var(--primary); }
        .small-note { color: #7f8c8d; font-size: 0.95rem; margin-top: 8px; }
    </style>
</head>
<body>

<div class="quiz-container">
    <div id="quiz-ui">
        <div class="header">
            <span id="progress-text">Pregunta 1 de 40</span>
            <div class="q-circle" id="q-number">1</div>
        </div>

        <h2 id="q-text">Carregant pregunta...</h2>
        <div class="options" id="opt-container"></div>
        <div class="feedback" id="feedback"></div>

        <div class="nav-controls">
            <button class="action btn-nav" onclick="changeQ(-1)">← Anterior</button>
            <button class="action btn-check" id="check-btn" onclick="checkAnswer()">Comprovar ✅</button>
            <button class="action btn-nav" onclick="changeQ(1)">Següent →</button>
        </div>

        <div class="grid-nav" id="grid-nav"></div>
        <button class="action btn-finish" style="width: 100%; margin-top: 22px;" onclick="showFinalResult()">Finalitzar i veure nota 🏆</button>
        <div class="small-note">Consell: pots saltar a qualsevol pregunta clicant el número.</div>
    </div>

    <div id="result-screen">
        <h1 id="result-title">Resultat final</h1>
        <div style="font-size: 4.2rem; font-weight: bold; margin: 18px 0; color: var(--primary);" id="final-score">0/40</div>
        <p id="final-msg" style="font-size: 1.15rem; margin-bottom: 26px;"></p>
        <button class="action btn-finish" onclick="resetQuiz()">Tornar a començar</button>
    </div>
</div>

<script>
const quizData = [
  { q: "Quina zona no va ser ocupada pels musulmans en el 711?", opts: ["El nord peninsular", "La vall del Guadalquivir", "La vall de l’Ebre"], a: 0 },
  { q: "En quina batalla va iniciar Pelai la resistència?", opts: ["Les Navas de Tolosa", "Covadonga (722)", "Guadalete"], a: 1 },
  { q: "En què es va convertir el Regne d’Astúries en l’any 910?", opts: ["Regne de Pamplona", "Regne de Castella", "Regne de Lleó"], a: 2 },
  { q: "Què era Castella en els seus orígens?", opts: ["Un regne independent", "Un comtat fronterer de Lleó", "Una taifa musulmana"], a: 1 },
  { q: "Qui va crear la Marca Hispànica?", opts: ["Alfons II", "Jaume I", "Carlemany"], a: 2 },
  { q: "Quins regnes naixen en el nucli pirinenc als segles IX-X?", opts: ["Pamplona (Navarra), Aragó i comtats catalans", "Castella, Lleó i Portugal", "Granada i Sevilla"], a: 0 },
  { q: "La idea de la Reconquesta defensava:", opts: ["Expandir-se cap a França", "Recuperar el regne visigot", "Fundar nous regnes musulmans"], a: 1 },
  { q: "El procés real de la Reconquesta va ser:", opts: ["Una guerra contínua sense pauses", "Ràpid i sense pactes", "Lent i amb llargs períodes de pau"], a: 2 },
  { q: "Quin riu es va convertir en frontera natural als segles IX-X?", opts: ["Tajo", "Ebre", "Duero"], a: 2 },
  { q: "Qui van ser repobladors de la vall del Duero?", opts: ["Camperols del nord i mossàrabs", "Almohades", "Francs"], a: 0 },
  { q: "Quin comte va aconseguir l’autonomia de Castella respecte a Lleó?", opts: ["Alfons VI", "Fernán González", "Sanç III"], a: 1 },
  { q: "Qui va saquejar el nord a finals del segle X?", opts: ["Almanzor", "Alfons II", "Jaume I"], a: 0 },
  { q: "En quin any es van unir definitivament Castella i Lleó?", opts: ["1137", "1212", "1230"], a: 2 },
  { q: "Amb quina unió va nàixer la Corona d’Aragó en 1137?", opts: ["Peronella d’Aragó i Ramon Berenguer IV", "Ferran III i Elionor", "Alfons VI i Urraca"], a: 0 },
  { q: "Quin regne es va independitzar de Lleó al segle XII?", opts: ["Navarra", "Portugal", "Aragó"], a: 1 },
  { q: "Després de la divisió d’al-Àndalus en taifes, els cristians cobraven:", opts: ["Delmes", "Tributs papals", "Pàries"], a: 2 },
  { q: "Qui va conquerir Toledo en 1085?", opts: ["Alfons VI", "Jaume I", "Ferran III"], a: 0 },
  { q: "Quina batalla de 1212 va obrir el pas cap al sud?", opts: ["Covadonga", "Les Navas de Tolosa", "Guadalete"], a: 1 },
  { q: "Quin territori va conquerir Jaume I al segle XIII?", opts: ["Múrcia", "Algarve", "València i Balears"], a: 2 },
  { q: "Quin regne va resistir fins a finals del segle XIII?", opts: ["Regne nassarita de Granada", "Taifa de Saragossa", "Regne de Lleó"], a: 0 },
  { q: "L’objectiu de la repoblació era:", opts: ["Augmentar el comerç exterior", "Controlar i defensar les zones conquistades", "Convertir els musulmans"], a: 1 },
  { q: "Quin sistema consistia en l’ocupació espontània de terres lliures?", opts: ["Furs", "Presura", "Latifundis"], a: 1 },
  { q: "A qui es van entregar grans lots de terra al segle XIII?", opts: ["Noblesa, Església i Ordes Militars", "Camperols lliures", "Burgesos urbans"], a: 0 },
  { q: "Qui eren els mudèjars?", opts: ["Cristians en territori musulmà", "Musulmans en territori cristià", "Jueus conversos"], a: 1 },
  { q: "On vivien segregats els mudèjars?", opts: ["Jueries", "Moreries", "Alcassabes"], a: 1 },
  { q: "L’art mudèjar mesclava:", opts: ["Tècniques visigodes i romanes", "Cristianisme amb tècniques musulmanes", "Gòtic amb barroc"], a: 1 },
  { q: "Qui va impulsar la conquesta del Regne de València?", opts: ["Alfons II", "Jaume I", "Sanç III"], a: 1 },
  { q: "En quin any va ser conquistada la ciutat de València?", opts: ["1238", "1244", "1304"], a: 0 },
  { q: "Quines lleis pròpies va crear Jaume I en 1261?", opts: ["Cartes de poblament", "Furs", "Pàries"], a: 1 },
  { q: "D’on procedien els repobladors del litoral valencià?", opts: ["Catalans", "Aragonesos", "Castellans"], a: 0 },
  { q: "Què es va descobrir a Galícia al segle IX?", opts: ["Un monestir visigot", "La tomba atribuïda a l’apòstol Sant Jaume", "Un palau reial"], a: 1 },
  { q: "Quin símbol identificava el pelegrí?", opts: ["Creu roja", "Espasa", "Petxina cosida a la roba"], a: 2 },
  { q: "Una conseqüència econòmica del Camí de Sant Jaume va ser:", opts: ["Desaparició del comerç", "Renaixement de ciutats", "Abandó de mercats"], a: 1 },
  { q: "El romànic francés estava vinculat a:", opts: ["La Reconquesta", "La Marca Hispànica", "El Camí de Sant Jaume"], a: 2 },
  { q: "Quina variant romànica és típica del nord de Catalunya i Aragó?", opts: ["Francés", "Llombard", "Mudèjar"], a: 1 },
  { q: "On es concentra l’escultura romànica?", opts: ["En jardins", "En palaus reials", "En portades i capitells"], a: 2 },
  { q: "Quin tema escultòric representa Crist en Majestat?", opts: ["Pantocràtor", "Apòstol pelegrí", "Arc triomfal"], a: 0 },
  { q: "Quina tècnica predomina en la pintura romànica?", opts: ["Oli sobre taula", "Fresc", "Tremp"], a: 1 },
  { q: "Quina característica tenen les figures de la pintura romànica?", opts: ["Moviment naturalista", "Perspectiva profunda", "Rigidesa i hieratisme"], a: 2 },
  { q: "On es decoraven principalment les pintures romàniques?", opts: ["Absis", "Torres defensives", "Muralles"], a: 0 }
];

let currentIdx = 0;
let userAnswers = new Array(quizData.length).fill(null);
let checkedStatus = new Array(quizData.length).fill(false);

function initGrid() {
  const nav = document.getElementById('grid-nav');
  nav.innerHTML = '';
  quizData.forEach((_, i) => {
    const item = document.createElement('div');
    item.className = 'grid-item';
    item.id = `grid-${i}`;
    item.innerText = i + 1;
    item.onclick = () => { currentIdx = i; render(); };
    nav.appendChild(item);
  });
}

function render() {
  const data = quizData[currentIdx];
  document.getElementById('q-number').innerText = currentIdx + 1;
  document.getElementById('progress-text').innerText = `Pregunta ${currentIdx + 1} de ${quizData.length}`;
  document.getElementById('q-text').innerText = data.q;
  document.getElementById('feedback').innerText = '';

  const container = document.getElementById('opt-container');
  container.innerHTML = '';

  data.opts.forEach((opt, i) => {
    const btn = document.createElement('button');
    btn.className = 'opt-btn';
    if (userAnswers[currentIdx] === i) btn.classList.add('selected');

    if (checkedStatus[currentIdx]) {
      if (i === data.a) btn.classList.add('correct');
      else if (userAnswers[currentIdx] === i) btn.classList.add('wrong');
    }

    btn.innerText = opt;
    btn.onclick = () => select(i);
    container.appendChild(btn);
  });

  quizData.forEach((_, i) => {
    const gridItem = document.getElementById(`grid-${i}`);
    gridItem.classList.remove('active', 'completed', 'correct', 'wrong');

    if (i === currentIdx) gridItem.classList.add('active');

    if (checkedStatus[i]) {
      const isCorrect = userAnswers[i] === quizData[i].a;
      gridItem.classList.add(isCorrect ? 'correct' : 'wrong');
    } else if (userAnswers[i] !== null) {
      gridItem.classList.add('completed');
    }
  });
}

function select(idx) {
  if (checkedStatus[currentIdx]) return;
  userAnswers[currentIdx] = idx;
  render();
}

function checkAnswer() {
  if (userAnswers[currentIdx] === null) {
    const fb = document.getElementById('feedback');
    fb.style.color = 'orange';
    fb.innerText = '⚠️ Tria una opció primer';
    return;
  }
  checkedStatus[currentIdx] = true;
  const isCorrect = userAnswers[currentIdx] === quizData[currentIdx].a;
  const fb = document.getElementById('feedback');
  fb.style.color = isCorrect ? 'var(--correct)' : 'var(--incorrect)';
  fb.innerText = isCorrect ? '✨ Molt bé! Resposta correcta' : '❌ Resposta incorrecta';
  render();
}

function changeQ(dir) {
  currentIdx += dir;
  if (currentIdx < 0) currentIdx = 0;
  if (currentIdx >= quizData.length) currentIdx = quizData.length - 1;
  render();
}

function showFinalResult() {
  let finalScore = 0;
  userAnswers.forEach((ans, i) => {
    if (ans === quizData[i].a) finalScore++;
  });

  document.getElementById('quiz-ui').style.display = 'none';
  document.getElementById('result-screen').style.display = 'block';
  document.getElementById('final-score').innerText = `${finalScore} / ${quizData.length}`;

  const msg = document.getElementById('final-msg');
  const pct = finalScore / quizData.length;

  if (pct >= 0.85) msg.innerText = "🏰 Excel·lent! Domines la conquesta i la repoblació.";
  else if (pct >= 0.60) msg.innerText = "✅ Bon treball! Repasse un poc dates i conceptes clau.";
  else msg.innerText = "📚 Cal repassar: reconquesta, repoblació i romànic.";
}

function resetQuiz() {
  currentIdx = 0;
  userAnswers = new Array(quizData.length).fill(null);
  checkedStatus = new Array(quizData.length).fill(false);
  document.getElementById('result-screen').style.display = 'none';
  document.getElementById('quiz-ui').style.display = 'block';
  initGrid();
  render();
}

initGrid();
render();
</script>
</body>
</html>
